version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: call-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: callassistant
      POSTGRES_PASSWORD: callassistant
      POSTGRES_DB: callassistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callassistant -d callassistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: call-assistant-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
