name: Release — Electron DMG

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v1.0.0, v1.2.3, etc.

permissions:
  contents: write   # needed to create GitHub release and upload assets

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    defaults:
      run:
        working-directory: apps/electron

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build + package DMG (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package-mac

      - name: List release artifacts
        run: ls -lh release/

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/electron/release/*.dmg
            apps/electron/release/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
